# --- Tmux Configuration ---

# Remap prefix from 'C-b' to 'C-q'
unbind C-b
set-option -g prefix C-q
bind-key C-q send-prefix

# Quality of life settings
set -g mouse on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm*:RGB"
set -g history-limit 10000

# Fix 2: Enable Extended Keys (For Ghostty/Kitty Keyboard Protocol)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Fix 1: Map Shift+Enter to a Line Feed (for new lines in CLIs)
bind-key -T root S-Enter send-keys C-j

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Fix right-click menu disappearing instantly (bind to MouseUp instead of MouseDown)
unbind -n MouseDown3Pane
bind-key -n MouseUp3Pane menu -T "#[align=centre]#{pane_index} (#{pane_id})" -x M -y M \
    "Horizontal Split" h { split-window -h } \
    "Vertical Split" v { split-window -v } \
    "" \
    "Swap Up" u { swap-pane -U } \
    "Swap Down" d { swap-pane -D } \
    "" \
    "Kill Pane" x { kill-pane } \
    "Zoom" z { resize-pane -Z }

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Stop tmux from automatically renaming windows
set-option -g allow-rename off

# Rename window using Alt + r (no prefix needed)
bind -n M-r command-prompt -I "#W" "rename-window '%%'"

# Open new windows in the current directory
bind c new-window -c "#{pane_current_path}"

# --- Pane Management ---

# split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switch panes using Ctrl + hjkl (no prefix needed)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# "Join" - pull a window into the current one as a pane
bind j command-prompt -p "Join pane from window #:"  "join-pane -s ':%%'"

# "Break" - move the current pane out into its own window (unsplit)
bind b break-pane

# "Zoom" - temporary unsplit
bind z resize-pane -Z

# --- Session Management ---

# Option A: Dynamic Session Menu (from Reddit post)
# Press Prefix + s
bind s run-shell "bash ~/dotfiles/scripts/tmux-session-menu.sh"

# Option C: FZF Session Popup (The Pro Setup)
# Press Prefix + Shift + s
bind S display-popup -w 80% -h 40% -E "tmux list-sessions -F '#{session_name}' | grep -v \"^$(tmux display-message -p '#S')$\" | fzf --reverse --header 'Jump to Session' | xargs -r tmux switch-client -t"

# Easier Resizing (Prefix + H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Visual tweaks (Subtle status bar)
set -g status-style bg=default,fg=white
set -g status-left "#[fg=green]#S #[fg=yellow]#{?client_prefix,PREFIX ,}"
set -g window-status-current-style fg=cyan,bold

# Open Gemini in a new window (no prefix needed)
bind -n C-g new-window -c "#{pane_current_path}" "/opt/homebrew/bin/gemini --yolo"

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"
