# --- Tmux Configuration ---

# Remap prefix from 'C-b' to 'C-q'
unbind C-b
set-option -g prefix C-q
bind-key C-q send-prefix

# Quality of life settings
set -g mouse on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm*:RGB"
set -g history-limit 10000

# Extended keys: let tmux distinguish Shift+Enter from Enter
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
bind-key -T root S-Enter send-keys C-j

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Fix right-click menu disappearing instantly (bind to MouseUp instead of MouseDown)
unbind -n MouseDown3Pane
bind-key -n MouseUp3Pane menu -T "#[align=centre]#{pane_index} (#{pane_id})" -x M -y M \
    "Horizontal Split" h { split-window -h } \
    "Vertical Split" v { split-window -v } \
    "" \
    "Swap Up" u { swap-pane -U } \
    "Swap Down" d { swap-pane -D } \
    "" \
    "Kill Pane" x { kill-pane } \
    "Zoom" z { resize-pane -Z }

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Open new windows/panes in the current directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Visual tweaks (Subtle status bar)
set -g status-style bg=default,fg=white
set -g status-left '#[fg=green]#S '
set -g window-status-current-style fg=cyan,bold
