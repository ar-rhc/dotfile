# --- Tmux Configuration ---

# Remap prefix from 'C-a' to 'C-q'
unbind C-a
set-option -g prefix C-q
bind-key C-q send-prefix

# Quality of life settings
set -g mouse on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm*:RGB"
set -g history-limit 10000

# Fix scrolling sensitivity (1 line at a time)
bind -T copy-mode-vi WheelUpPane send-keys -X scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X scroll-down
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# Explicitly bind right-click to the tmux menu
bind-key -n MouseDown3Pane menu -T "#[align=centre]#{pane_index} (#{pane_id})" -x M -y M \
    "Horizontal Split" h { split-window -h } \
    "Vertical Split" v { split-window -v } \
    "" \
    "Swap Up" u { swap-pane -U } \
    "Swap Down" d { swap-pane -D } \
    "" \
    "Kill Pane" x { kill-pane } \
    "Zoom" z { resize-pane -Z }

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Stop tmux from automatically renaming windows
set-option -g allow-rename off

# Rename window using Alt + r (no prefix needed)
bind -n M-r command-prompt -I "#W" "rename-window '%%'"

# Open new windows in the current directory
bind c new-window -c "#{pane_current_path}"

# --- Pane Management ---

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Switch panes using Ctrl + hjkl (no prefix needed)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# "Join" - pull a window into the current one as a pane
# Press Prefix + j, then type the window number (e.g., 2)
bind j command-prompt -p "Join pane from window #:"  "join-pane -s ':%%'"

# "Break" - move the current pane out into its own window (unsplit)
# Press Prefix + b
bind b break-pane

# "Zoom" - temporary unsplit
# Press Prefix + z to toggle fullscreen on a pane
bind z resize-pane -Z

# Easier Resizing (Prefix + H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Visual tweaks (Subtle status bar)
set -g status-style bg=default,fg=white
set -g status-left "#[fg=green]#S #[fg=yellow]#{?client_prefix,PREFIX ,}"
set -g window-status-current-style fg=cyan,bold

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"
