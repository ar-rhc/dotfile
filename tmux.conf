# --- Tmux Configuration ---

# Remap prefix from 'C-b' to 'C-q'
unbind C-b
set-option -g prefix C-q
bind-key C-q send-prefix

# Quality of life settings
set -g mouse on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm*:RGB"
set -g history-limit 10000

# Extended keys
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
bind-key -T root S-Enter send-keys C-j

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# --- Mouse / Menu Stabilization (MouseUp Version) ---

# 1. Clear all triggers
unbind -n MouseDown3Pane
unbind -n MouseUp3Pane
unbind -T root MouseDown3Pane
unbind -T root MouseUp3Pane

# 2. Bind to MouseUp3 (Release) to prevent instant disappearance
bind-key -n MouseUp3Pane menu -T "#[align=centre] Pane Menu " -x M -y M \
    "Horizontal Split" h { split-window -h -c "#{pane_current_path}" } \
    "Vertical Split"   v { split-window -v -c "#{pane_current_path}" } \
    "" \
    "Zoom Pane"        z { resize-pane -Z } \
    "Kill Pane"        x { kill-pane }

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Stop tmux from automatically renaming windows
set-option -g allow-rename off

# Rename window using Alt + r
bind -n M-r command-prompt -I "#W" "rename-window '%%'"

# Open new windows in the current directory
bind c new-window -c "#{pane_current_path}"

# --- Pane Management ---

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switch panes using Ctrl + hjkl
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# --- Session Management ---

# Option A: Dynamic Session Menu
bind s run-shell "bash ~/dotfiles/scripts/tmux-session-menu.sh"

# Option C: FZF Session Popup
# Using a slightly more robust shell call for the popup
bind S display-popup -w 80% -h 40% -E "bash -c 'tmux list-sessions -F \"##S\" | fzf --reverse --header \"Switch Session\" | xargs -r tmux switch-client -t'"

# Visual tweaks
set -g status-style bg=default,fg=white
set -g status-left "#[fg=green]#S #[fg=yellow]#{?client_prefix,PREFIX ,}"
set -g window-status-current-style fg=cyan,bold

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"
