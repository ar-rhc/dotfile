# --- Tmux Configuration ---

# Ensure tmux knows about Homebrew paths (essential for M1/M2/M3 Macs)
set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

# Remap prefix from 'C-b' to 'C-q'
unbind C-b
set-option -g prefix C-q
bind-key C-q send-prefix

# Quality of life settings
set -g mouse on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm*:RGB"
set -g history-limit 10000

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Enable pane titles and show them on the top border
set -g pane-border-status top
set -g pane-border-format " #P: #{pane_title} "

# --- Mouse / Menu Stabilization (MouseUp Version) ---

# Quick Action Menu (Triggered by Ctrl + ` via Ghostty mapping to Prefix + m)
bind m menu -T "#[align=centre] Quick Actions " -x C -y C \
    "Horizontal Split" | { split-window -h -c "#{pane_current_path}" } \
    "Vertical Split"   - { split-window -v -c "#{pane_current_path}" } \
    "" \
    "Zoom Pane"        z { resize-pane -Z } \
    "Kill Pane"        x { kill-pane } \
    "" \
    "Rename Pane"      p { command-prompt -p "New pane title: " -I "#{pane_title}" "select-pane -T '%%'" } \
    "Rename Window"    r { command-prompt -I "#W" "rename-window '%%'" } \
    "Session Switcher" s { display-popup -w 30% -h 35% -E "bash ~/dotfiles/scripts/tmux-session-fzf.sh" } \
    "List Shortcuts"   ? { list-keys }

# 1. Clear all triggers
unbind -n MouseDown3Pane
unbind -n MouseUp3Pane
unbind -T root MouseDown3Pane
unbind -T root MouseUp3Pane

# 2. Bind to MouseUp3 (Release) to prevent instant disappearance
bind-key -n MouseUp3Pane menu -T "#[align=centre] Pane Menu " -x M -y M \
    "Horizontal Split" h { split-window -h -c "#{pane_current_path}" } \
    "Vertical Split"   v { split-window -v -c "#{pane_current_path}" } \
    "" \
    "Zoom Pane"        z { resize-pane -Z } \
    "Kill Pane"        x { kill-pane } \
    "Rename Pane"      p { command-prompt -p "New pane title: " -I "#{pane_title}" "select-pane -T '%%'" }

# Stop tmux from automatically renaming windows
set-option -g allow-rename off

# Rename window using Alt + r
bind -n M-r command-prompt -I "#W" "rename-window '%%'"

# Open new windows in the current directory
bind c new-window -c "#{pane_current_path}"

# --- Pane Management ---

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switch panes using Ctrl + hjkl
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# --- Session Management ---

# Option C: FZF Session Popup (The Pro Setup)
bind s display-popup -w 30% -h 35% -E "bash ~/dotfiles/scripts/tmux-session-fzf.sh"

# Sessionizer: Search folders and create/switch sessions
# Press Prefix + f
bind f display-popup -w 80% -h 40% -E "bash ~/dotfiles/scripts/tmux-sessionizer.sh"

# Visual tweaks
set -g status-style bg=default,fg=white
set -g status-left "#[fg=green]#S #[fg=yellow]#{?client_prefix,PREFIX ,}"
set -g window-status-current-style fg=cyan,bold

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"
