####### Service   Mode   #######
#                              #
#                              #
#                              #
################################


# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes

# disabled hide window
# cmd-h = []
# rotate hangul and english

[mode.service.binding]
esc = [
    'mode main',
    'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_service_mode_exit',
    'reload-config',
    'exec-and-forget /opt/homebrew/bin/sketchybar --update'
]
r = ['flatten-workspace-tree'] # reset layout
q = ['exec-and-forget /opt/homebrew/bin/sketchybar --reload'] # Full SketchyBar reload
#s = ['layout sticky tiling'] # sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
f = ['layout floating tiling', 'mode main', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_service_mode_exit'] # Toggle floating/tiling + exit
d = ['exec-and-forget /bin/bash $HOME/dotfiles/aerospace/scripts/toggle-floating-default.sh'] # Toggle default float/tile for focused app
alt-ctrl-shift-f = ['fullscreen', 'mode main', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_service_mode_exit'] # Toggle fullscreen + exit
c = ['exec-and-forget /bin/bash -c "$HOME/.config/sketchybar/plugins/scripts/close_empty_windows.sh"'] # Close empty windows
t = ['layout tiles accordion'] # Toggle tiles/accordion
e = ['balance-sizes'] # Equalize window sizes
s = ['layout h_tiles v_tiles'] # Toggle split direction
w = ['close', 'mode main', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_service_mode_exit'] # Close window + exit
g = ['exec-and-forget /bin/bash $HOME/dotfiles/aerospace/scripts/toggle-gaps.sh'] # Toggle gaps
equal = ['resize smart +50'] # Resize bigger
minus = ['resize smart -50'] # Resize smaller

left = ['join-with left']
down = ['join-with down']
up = ['join-with up']
right = ['join-with right']
h = ['join-with left']
j = ['join-with down']
k = ['join-with up']
l = ['join-with right']

alt-ctrl-shift-esc = [
    'mode main',
    'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_service_mode_exit'
]

# Disable unbound keys in service mode
