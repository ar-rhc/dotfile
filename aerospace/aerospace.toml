# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking

# SketchyBar path: /opt/homebrew/bin/sketchybar
# Used in exec-and-forget commands for service mode triggers

# You can use it to add commands that run after login to macOS user session.
# 'start-at-login' needs to be 'true' for 'after-login-command' to work
# Available commands: https://nikitabobko.github.io/AeroSpace/commands
after-login-command = []

# You can use it to add commands that run after AeroSpace startup.
# 'after-startup-command' is run after 'after-login-command'
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = [
    # JankyBorders has a built-in detection of already running process,
    # so it won't be run twice on AeroSpace restart
    'exec-and-forget /opt/homebrew/bin/sketchybar',
    'exec-and-forget /bin/bash ~/.config/borders/bordersrc'
]

exec-on-workspace-change = [
    # Then trigger sketchybar update
    '/bin/bash',
    '-c',
    '/opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change AEROSPACE_FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE AEROSPACE_PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE',
]




# Start AeroSpace at login
start-at-login = true

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = false

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 50

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Possible values: (qwerty|dvorak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
key-mapping.preset = 'qwerty'

## on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
## on-focus-changed = ['move-mouse window-lazy-center']
## Note: on-focus-changed only accepts aerospace commands, not shell scripts
## Using periodic refresh in sketchybar instead (update_freq=2 in spaces.sh)

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See: https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
# Name-based assignment: each list is a fallback chain — AeroSpace picks the
# first matching connected monitor. Final 'main' entry guarantees a match on
# any setup (e.g. MacBook with only the built-in display, where none of the
# named external monitors are connected). Adapts across 1/2/3-monitor setups.
[workspace-to-monitor-force-assignment]
# Group 1 — preferred on HP, falls back to LG, then to main
1 = ['HP E24u G4', 'LG ULTRAFINE', 'main']
Q = ['HP E24u G4', 'LG ULTRAFINE', 'main']
A = ['HP E24u G4', 'LG ULTRAFINE', 'main']
Z = ['HP E24u G4', 'LG ULTRAFINE', 'main']

# Group 2 — LG, falls back to main
2 = ['LG ULTRAFINE', 'main']
W = ['LG ULTRAFINE', 'main']
S = ['LG ULTRAFINE', 'main']
X = ['LG ULTRAFINE', 'main']

# Group 3 — Samsung, falls back to main
3 = ['S24C31x', 'main']
E = ['S24C31x', 'main']
D = ['S24C31x', 'main']
C = ['S24C31x', 'main']
M = ['S24C31x', 'main']


[gaps]
inner.horizontal = 5
inner.vertical = 5
# Top gap for battery indicator - all monitors get 45px
outer.top = [{ monitor."1" = 45 }, { monitor."2" = 45 }, { monitor."3" = 45 }, 45]
outer.left = 5
outer.bottom = 5
outer.right = 5

# See https://nikitabobko.github.io/AeroSpace/guide#exec-env-vars

[exec] # Again, you don't need to copy all config sections to your config.
inherit-env-vars = true # If you don't touch "exec" section,

[exec.env-vars] # it will fallback to "default-config.toml"
PATH = '/opt/homebrew/bin:/opt/homebrew/sbin:${PATH}'

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
[mode.main.binding]

# All possible keys:
# - Letters.        a, b, c, ..., z
# - Numbers.        0, 1, 2, ..., 9
# - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
# - F-keys.         f1, f2, ..., f20
# - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon, backtick,
#                   leftSquareBracket, rightSquareBracket, space, enter, esc, backspace, tab
# - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
#                   keypadMinus, keypadMultiply, keypadPlus
# - Arrows.         left, down, up, right
# All possible modifiers: cmd, alt, ctrl, shift
# All possible commands: https://nikitabobko.github.io/AeroSpace/commands

# You can uncomment this line to open up terminal with alt + enter shortcut-
# See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
# alt-enter = 'exec-and-forget open -n /System/Applications/Utilities/Terminal.app'

# See: https://nikitabobko.github.io/AeroSpace/commands#layout

########## Layout Commands ##########
alt-ctrl-shift-slash = 'layout tiles horizontal vertical'
alt-ctrl-shift-period = 'layout accordion horizontal vertical'
alt-ctrl-shift-comma = 'layout accordion horizontal vertical'
alt-ctrl-shift-f = ['layout floating tiling']
alt-ctrl-shift-r = 'exec-and-forget /opt/homebrew/bin/sketchybar --update && /opt/homebrew/bin/sketchybar --bar color=0xa000804a && sleep 0.3 && /opt/homebrew/bin/sketchybar --bar color=0xa0000000'
alt-ctrl-shift-v = 'exec-and-forget /bin/bash $HOME/dotfiles/aerospace/scripts/center-window.sh' # Center active window


# See: https://nikitabobko.github.io/AeroSpace/commands#focus

alt-keypad4 = 'focus left --boundaries all-monitors-outer-frame'
alt-keypad2 = 'focus down --boundaries all-monitors-outer-frame'
alt-keypad8 = 'focus up --boundaries all-monitors-outer-frame'
alt-keypad6 = 'focus right --boundaries all-monitors-outer-frame'

alt-shift-h = 'focus left --boundaries all-monitors-outer-frame'
alt-shift-j = 'focus down --boundaries all-monitors-outer-frame'
alt-shift-k = 'focus up --boundaries all-monitors-outer-frame'
alt-shift-l = 'focus right --boundaries all-monitors-outer-frame'

# Focus next/previous window in accordion layout (DFS traversal)
# These work great for cycling through stacked windows in accordion mode
# dfs-next/prev: Depth-first traversal (wraps around automatically)
alt-shift-ctrl-tab = 'focus dfs-next --boundaries workspace'
cmd-alt-shift-ctrl-tab = 'focus dfs-prev'




# See: https://nikitabobko.github.io/AeroSpace/commands#move
# Move window position
alt-ctrl-shift-h = 'move left'
alt-ctrl-shift-j = 'move down'
alt-ctrl-shift-k = 'move up'
alt-ctrl-shift-l = 'move right'

alt-ctrl-shift-keypad4 = 'move left'
alt-ctrl-shift-keypad2 = 'move down'
alt-ctrl-shift-keypad6 = 'move right'
alt-ctrl-shift-keypad8 = 'move up'


# See: https://nikitabobko.github.io/AeroSpace/commands#resize
alt-ctrl-shift-keypadMinus = 'resize smart -50'
alt-ctrl-shift-keypadPlus = 'resize smart +50'
alt-ctrl-shift-leftSquareBracket = 'resize smart -50'
alt-ctrl-shift-rightSquareBracket = 'resize smart +50'

# --- Others ---
# Display brightness control (BetterDisplay)
alt-keypadPlus = 'exec-and-forget /bin/bash -c "/opt/homebrew/bin/BetterDisplaycli set -name=\"HP E24u G4\" -brightness=1 && /opt/homebrew/bin/BetterDisplaycli set -name=\"S24C31x\" -brightness=1"'
alt-keypadMinus = 'exec-and-forget /bin/bash -c "/opt/homebrew/bin/BetterDisplaycli set -name=\"HP E24u G4\" -brightness=0 && /opt/homebrew/bin/BetterDisplaycli set -name=\"S24C31x\" -brightness=0"'
alt-keypad0 = 'exec-and-forget /bin/bash -c "/opt/homebrew/bin/BetterDisplaycli set -name=\"HP E24u G4\" -brightness=0 && /opt/homebrew/bin/BetterDisplaycli set -name=\"S24C31x\" -brightness=0"'

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace
