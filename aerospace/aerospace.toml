alt-ctrl-shift-a = 'workspace A'
alt-ctrl-shift-z = 'workspace Z'
alt-ctrl-shift-2 = 'workspace 2'
alt-ctrl-shift-w = 'workspace W'
alt-ctrl-shift-s = 'workspace S'
alt-ctrl-shift-x = 'workspace X'
alt-ctrl-shift-3 = 'workspace 3'
alt-ctrl-shift-e = 'workspace E'
alt-ctrl-shift-d = 'workspace D'
alt-ctrl-shift-c = 'workspace C'
alt-ctrl-shift-m = 'workspace M'


# See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
#alt-ctrl-shift-tab = 'workspace-back-and-forth'
# See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
# cmd-alt-ctrl-shift-tab = 'move-workspace-to-monitor --wrap-around right'

# Custom workspace cycling based on monitor (vertical column order)
# Monitor 1: 1, Q, A, Z | Monitor 2: 2, W, S, X | Monitor 3: 3, E, D, C, M
# Cycle workspaces (script path uses $HOME/dotfiles so it works when ~/.config/aerospace points at unmounted NVme)
alt-ctrl-p = 'exec-and-forget /bin/bash -c "$HOME/dotfiles/aerospace/scripts/cycle-workspace.sh"'
alt-ctrl-o = 'exec-and-forget /bin/bash -c "$HOME/dotfiles/aerospace/scripts/cycle-workspace-prev.sh"'




