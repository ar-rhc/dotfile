# Ghostty Configuration

# ------------------------------------------------------------------------------
# Core Execution
# ------------------------------------------------------------------------------
command = /bin/bash -l -c "/opt/homebrew/bin/tmux attach || /opt/homebrew/bin/tmux"

# ------------------------------------------------------------------------------
# Quick Terminal (Visor / Quake Style)
# ------------------------------------------------------------------------------
# Toggle with Option + Space (Note: Only works when Ghostty is focused)
keybind = alt+space=toggle_quick_terminal
keybind = alt+r=text:\x01,
quick-terminal-position = top
quick-terminal-autohide = true
quick-terminal-animation-duration = 0.2

# ------------------------------------------------------------------------------
# Aesthetics & Window Management
# ------------------------------------------------------------------------------
macos-titlebar-style = transparent
macos-option-as-alt = true
background-opacity = 0.95
background-blur-radius = 20
mouse-scroll-multiplier = 1

# Modernizing the window
window-padding-x = 4
window-padding-y = 4
window-decoration = true

# Font & Rendering
font-family = "JetBrainsMono Nerd Font"
font-size = 13
cursor-style = block
cursor-style-blink = true

# ------------------------------------------------------------------------------
# Tmux Navigation Passthrough
# ------------------------------------------------------------------------------
keybind = shift+enter=text:\n
keybind = ctrl+enter=text:\n

keybind = super+t=unbind
keybind = super+w=unbind
keybind = super+shift+]=unbind
keybind = super+shift+[=unbind
keybind = super+left=unbind
keybind = super+right=unbind

keybind = super+digit_1=unbind
keybind = super+digit_2=unbind
keybind = super+digit_3=unbind
keybind = super+digit_4=unbind
keybind = super+digit_5=unbind
keybind = super+digit_6=unbind
keybind = super+digit_7=unbind
keybind = super+digit_8=unbind
keybind = super+digit_9=unbind

keybind = super+t=text:\x01c
keybind = super+w=text:exit\r
keybind = super+shift+]=text:\x01n
keybind = super+shift+[=text:\x01p
keybind = super+digit_1=text:\x011
keybind = super+digit_2=text:\x012
keybind = super+digit_3=text:\x013
keybind = super+digit_4=text:\x014
keybind = super+digit_5=text:\x015
keybind = super+digit_6=text:\x016
keybind = super+digit_7=text:\x017
keybind = super+digit_8=text:\x018
keybind = super+digit_9=text:\x019
